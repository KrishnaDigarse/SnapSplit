services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - snapsplit-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${JWT_SECRET_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ENVIRONMENT=${ENV}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - snapsplit-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    # Exposing 8000 internally to frontend (via nginx proxy) and host for debugging if needed, 
    # but strictly speaking only frontend needs to reach it via network alias 'backend' on port 8000.
    # Mapping to host 8000 allows direct API access if desired.
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${JWT_SECRET_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - backend
      - redis
    networks:
      - snapsplit-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: snapsplit_user
      POSTGRES_PASSWORD: snapsplit_password
      POSTGRES_DB: snapsplit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - snapsplit-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U snapsplit_user -d snapsplit_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - snapsplit-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  snapsplit-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
