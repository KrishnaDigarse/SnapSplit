services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - snapsplit-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/snapsplit_db
      SPRING_DATASOURCE_USERNAME: snapsplit_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-snapsplit_password}
      SPRING_DATA_REDIS_HOST: redis
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      APP_JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    volumes:
      - bill_uploads:/app/uploads/bills
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - snapsplit-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8000/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: snapsplit_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-snapsplit_password}
      POSTGRES_DB: snapsplit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - snapsplit-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U snapsplit_user -d snapsplit_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - snapsplit-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  snapsplit-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  bill_uploads:
