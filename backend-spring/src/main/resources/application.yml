server:
  port: 8000

spring:
  application:
    name: snapsplit

  # ── Database ──
  datasource:
    url: jdbc:postgresql://localhost:5432/snapsplit_db
    username: snapsplit_user
    password: snapsplit_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000        # 5 min
      max-lifetime: 1800000       # 30 min
      connection-timeout: 30000   # 30 sec

  jpa:
    hibernate:
      ddl-auto: validate          # validate existing schema, don't modify
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── JWT ──
app:
  jwt:
    secret: snapsplit-jwt-secret-key-change-in-production-2026
    expiration-ms: 604800000      # 7 days

  # ── Groq LLM ──
  groq:
    api-key: ${GROQ_API_KEY:}     # set via env var
    model: llama-3.3-70b-versatile

  # ── OCR ──
  ocr:
    tessdata-path: ${TESSDATA_PREFIX:}  # set via env var or Docker

  # ── File Uploads ──
  upload:
    dir: uploads/bills

# ── CORS ──
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Logging ──
logging:
  level:
    com.snapsplit: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# ── Swagger / OpenAPI ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
